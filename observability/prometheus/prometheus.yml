global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: spark-master
    metrics_path: /metrics/master/prometheus
    static_configs:
      - targets: ["spark-master:8080"]

  - job_name: spark-worker
    metrics_path: /metrics/worker/prometheus
    static_configs:
      - targets: ["spark-worker:8081"]

  # honor_labels lets each job's pushed grouping_key/labels (job_name, app_id,
  # ...) pass through untouched instead of being overwritten by this scrape job.
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
