server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*(spark-master|spark-worker|spark-job).*"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
    pipeline_stages:
      # spark-job emits JSON lines (see spark_app/observability/logging_setup.py);
      # spark-master/spark-worker emit plain log4j text, so this stage is a no-op
      # for them and the raw line still ships through unmodified.
      - json:
          expressions:
            level: level
            logger: logger
            trace_id: trace_id
      - labels:
          level:
          logger:
