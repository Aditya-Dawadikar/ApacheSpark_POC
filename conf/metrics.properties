# Enables Spark's built-in Prometheus metrics sink for the long-running
# master/worker processes, plus JVM metrics (heap, GC) for every role
# (master/worker/driver/executor). Picked up automatically because the
# Dockerfile sets SPARK_CONF_DIR=/app/conf.
#
# Driver/executor metrics are NOT scraped via this sink in practice — jobs
# are too short-lived for Prometheus's pull interval to catch them. See
# src/spark_app/observability/metrics.py for how driver/executor/task-level
# metrics (shuffle, spill, skew) are captured instead, via the Spark REST API
# and pushed to the Pushgateway right before each job's SparkSession stops.

*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
master.sink.prometheusServlet.path=/metrics/master/prometheus
worker.sink.prometheusServlet.path=/metrics/worker/prometheus
driver.sink.prometheusServlet.path=/metrics/prometheus
executor.sink.prometheusServlet.path=/metrics/executors/prometheus

*.source.jvm.class=org.apache.spark.metrics.source.JvmSource
