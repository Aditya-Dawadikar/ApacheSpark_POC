services:
  spark-master:
    build: .
    image: spark-dag:latest
    hostname: spark-master
    entrypoint: []
    command: ["spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    ports:
      - "8080:8080"  # Master web UI — cluster status, workers, running/completed applications

  spark-worker:
    build: .
    image: spark-dag:latest
    entrypoint: []
    command: ["spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8081"]
    depends_on:
      - spark-master
    volumes:
      # Executors run inside this container, so it needs the same host mount
      # as spark-job — otherwise executors read/write against the image's
      # stale baked-in copy of data/ instead of the live host directory.
      - ./data:/app/data
    ports:
      - "8081:8081"  # Worker web UI — this worker's executors and logs

  spark-job:
    build: .
    image: spark-dag:latest
    hostname: spark-job
    depends_on:
      - spark-master
      - spark-worker
    environment:
      SPARK_APP_NAME: spark-app
      SPARK_MASTER: spark://spark-master:7077
      SPARK_DRIVER_HOST: spark-job
      INPUT_PATH: /app/data/input
      OUTPUT_PATH: /app/data/output
      OUTPUT_FORMAT: csv
    volumes:
      - ./data:/app/data
    ports:
      - "4040:4040"  # Driver/application UI — live job, stage, and task progress
    # "all" runs Job 1 through Job 6 in sequence in one invocation; pass
    # `--job job_03` (etc.) to run a single job against the previous job's
    # already-written output instead.
    command: ["--job", "all"]
